<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f7f4ef;
            color: #111;
            overflow-x: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* CONTAINER PRINCIPAL */
        .gallery-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 6%;
            text-align: center;
        }

        /* CABEÇALHO DA GALERIA */
        .gallery-header {
            margin-bottom: 60px;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            letter-spacing: 5px;
            color: #a58f72;
            margin-bottom: 20px;
            display: block;
            text-transform: uppercase;
        }

        .gallery-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 72px;
            font-weight: 300;
            line-height: 1;
            color: #111;
            letter-spacing: 1px;
        }

        /* GRID DA GALERIA CORRIGIDO */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            grid-auto-rows: minmax(300px, auto); /* Corrigido aqui */
            gap: 25px;
            margin-bottom: 60px;
        }

        /* CLASSES DINÂMICAS DO MOSAICO */
        .gallery-item.tall {
            grid-row: span 2;
        }

        .gallery-item.wide {
            grid-column: span 2;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.04);
            background-color: #e2ded5;
        }

        /* IMAGENS */
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .gallery-item:hover img {
            transform: scale(1.06);
        }

        /* CAPA ESCURA (OVERLAY) */
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .gallery-overlay span {
            color: #fff;
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.6);
            padding-bottom: 5px;
            transform: translateY(10px);
            transition: transform 0.4s ease;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-item:hover .gallery-overlay span {
            transform: translateY(0);
        }

        /* BOTÃO VOLTAR */
        .gallery-btn {
            display: inline-block;
            padding: 15px 45px;
            border: 1px solid #111;
            text-decoration: none;
            color: #111;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            letter-spacing: 3px;
            font-weight: 500;
            transition: 0.3s ease;
        }

        .gallery-btn:hover {
            background: #111;
            color: #fff;
        }

        /* RESPONSIVO */
        @media(max-width:1100px){
            .gallery-header h1 {
                font-size: 56px;
            }
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                grid-auto-rows: minmax(250px, auto); /* Padronizado */
                gap: 15px;
            }
            .gallery-item.wide {
                grid-column: span 1;
            }
        }

        @media(max-width:700px){
            .gallery-container {
                padding: 50px 6%;
            }
            .gallery-header h1 {
                font-size: 42px;
            }
            .gallery-grid {
                grid-template-columns: 1fr;
                grid-auto-rows: minmax(280px, auto); /* Corrigido o erro de digitação do 's' */
            }
            .gallery-item.tall {
                grid-row: span 1;
            }
        }
    </style>
</head>

<body>

<div class="gallery-container">

    <header class="gallery-header">
        <span class="subtitle">CONHEÇA O AMBIENTE</span>
        <h1>Galeria</h1>
    </header>

    <div class="gallery-grid">

        <div class="gallery-item">
            <img src="mercadosao.jpeg" alt="Ambiente Interno">
            <div class="gallery-overlay">
                <span>O Ambiente</span>
            </div>
        </div>

        <div class="gallery-item">
            <img src="011.jpeg" alt="Prato Executivo">
            <div class="gallery-overlay">
                <span>Alta Gastronomia</span>
            </div>
        </div>

        <div class="gallery-item tall">
            <img src="012.jpeg" alt="Vista do Rooftop">
            <div class="gallery-overlay">
                <span>A Vista</span>
            </div>
        </div>

    </div>

    <a href="index.html" class="gallery-btn">HOME</a>

</div>

</body>
</html>
