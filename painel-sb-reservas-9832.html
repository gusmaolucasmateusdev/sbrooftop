<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento - Reservas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            max-width: 850px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            background-color: #f7f4ef; 
            color: #2c2a29;
        }
        
        h2 { 
            font-family: 'Cormorant Garamond', serif; 
            color: #1a1918; 
            text-align: center; 
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
        }
        
        .topo-painel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid #eae5dd;
        }

        .filtro-data { 
            font-size: 15px;
        }

        .filtro-data label {
            color: #5c5854;
            font-weight: 500;
        }
        
        input[type="date"], input[type="text"], input[type="tel"], input[type="email"], select { 
            padding: 10px 14px; 
            font-size: 15px; 
            font-family: inherit;
            border-radius: 6px; 
            border: 1px solid #dcd6cd; 
            background-color: #ffffff;
            color: #2c2a29;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: #8c8275;
        }

        input[type="date"] {
            margin-left: 8px;
        }
        
        .lista-reservas { 
            background: #ffffff; 
            padding: 10px 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); 
            border: 1px solid #eae5dd;
        }
        
        .item-reserva { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 24px 0; 
            border-bottom: 1px solid #f2ede4; 
            gap: 20px; 
        }
        
        .item-reserva:last-child { 
            border-bottom: none; 
        }
        
        .info-cliente { 
            font-size: 14px; 
            color: #5c5854; 
            line-height: 1.6; 
        }
        
        .info-cliente .destaque-hora { 
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px; 
            color: #1a1918; 
            font-weight: 700; 
            margin-right: 8px; 
        }
        
        .info-cliente .nome-cliente { 
            font-size: 16px; 
            font-weight: 600; 
            color: #2c2a29; 
            margin-right: 8px;
        }
        
        .badge-pessoas { 
            background-color: #eae5dd; 
            color: #4a443f; 
            padding: 4px 10px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 500; 
        }
        
        .link-whatsapp { 
            color: #3b7a57; 
            text-decoration: none; 
            font-weight: 500; 
            border-bottom: 1px dashed #3b7a57;
        }
        
        .link-whatsapp:hover { 
            color: #28543c;
            border-bottom-style: solid;
        }
        
        .detalhe-secundario { 
            font-size: 13px; 
            color: #8c8275; 
            display: inline-block;
            margin-top: 6px;
        }

        .acoes-reserva { 
            display: flex; 
            gap: 8px; 
        }
        
        .btn-acao { 
            border: none; 
            padding: 10px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 500; 
            font-size: 13px; 
            font-family: inherit;
            transition: all 0.2s ease;
        }
        
        .btn-concluir { 
            background-color: #4a5d4e; 
            color: white;
        }
        
        .btn-concluir:hover { 
            background-color: #38463b; 
        }
        
        .btn-cancelar { 
            background-color: transparent; 
            color: #a34747;
            border: 1px solid #f2dcd0;
        }
        
        .btn-cancelar:hover { 
            background-color: #fff5f5; 
            border-color: #a34747;
        }

        .btn-add-manual {
            background-color: #1a1918;
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .btn-add-manual:hover {
            background-color: #3d3a37;
        }
        
        .sem-reservas { 
            text-align: center; 
            color: #8c8275; 
            font-style: italic; 
            padding: 40px 20px; 
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
        }

        /* ESTILOS DO MODAL DE RESERVA MANUAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #ffffff;
            width: 90%;
            max-width: 500px;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #eae5dd;
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }

        .modal-box h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 26px;
            margin-bottom: 20px;
            color: #1a1918;
            border-bottom: 1px solid #f2ede4;
            padding-bottom: 10px;
        }

        .form-grupo {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-grupo label {
            font-size: 14px;
            font-weight: 500;
            color: #5c5854;
        }

        .form-grupo input, .form-grupo select {
            width: 100%;
            box-sizing: border-box;
        }

        .modal-botoes {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
            border-top: 1px solid #f2ede4;
            padding-top: 15px;
        }

        @media (max-width: 600px) {
            .topo-painel {
                flex-direction: column;
                gap: 16px;
                align-items: stretch;
                text-align: center;
            }
            .item-reserva {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }
            .acoes-reserva {
                width: 100%;
            }
            .btn-acao {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <h2>Painel de Gerenciamento — SB Rooftop</h2>

    <div class="topo-painel">
        <div class="filtro-data">
            <label for="data-painel">Visualizar Reservas do Dia:</label>
            <input type="date" id="data-painel">
        </div>
        <button class="btn-add-manual" id="btn-abrir-modal">+ Nova Reserva Manual</button>
    </div>

    <div class="lista-reservas">
        <div id="container-reservas">
            <p class="sem-reservas">Selecione uma data para visualizar os agendamentos.</p>
        </div>
    </div>

    <div class="modal-overlay" id="modalManual">
        <div class="modal-box">
            <h3>Lançar Reserva Manual (WhatsApp/Balcão)</h3>
            <form id="form-manual">
                <div class="form-grupo">
                    <label for="m-nome">Nome do Cliente</label>
                    <input type="text" id="m-nome" required placeholder="Ex: João Silva">
                </div>
                <div class="form-grupo">
                    <label for="m-whatsapp">WhatsApp</label>
                    <input type="tel" id="m-whatsapp" required placeholder="Ex: (91) 98304-2701">
                </div>
                <div class="form-grupo">
                    <label for="m-email">E-mail (Opcional)</label>
                    <input type="email" id="m-email" placeholder="Ex: cliente@email.com">
                </div>
                <div class="form-grupo">
                    <label for="m-pessoas">Quantidade de Pessoas</label>
                    <select id="m-pessoas" required>
                        <option value="4">4 pessoas</option>
                        <option value="5">5 pessoas</option>
                        <option value="6">6 pessoas</option>
                        <option value="7">7 pessoas</option>
                        <option value="8">8 pessoas</option>
                        <option value="10">10 pessoas</option>
                        <option value="15">15 pessoas</option>
                        <option value="20+">Mais de 20 pessoas</option>
                    </select>
                </div>
                <div class="form-grupo">
                    <label for="m-data">Data da Reserva</label>
                    <input type="date" id="m-data" required>
                </div>
                <div class="form-grupo">
                    <label for="m-horario">Horário</label>
                    <select id="m-horario" required>
                        <option value="18:00">18:00</option>
                        <option value="19:00">19:00</option>
                        <option value="20:00">20:00</option>
                    </select>
                </div>
                <div class="modal-botoes">
                    <button type="button" class="btn-acao btn-cancelar" id="btn-fechar-modal">Voltar</button>
                    <button type="submit" class="btn-acao btn-concluir">Salvar no Painel</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIGURAÇÃO DO SEU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBfVK_wdEcilwjNaByZUZBG_kALmThV5JA",
            authDomain: "alto-do-parque.firebaseapp.com",
            projectId: "alto-do-parque",
            storageBucket: "alto-do-parque.firebasestorage.app",
            messagingSenderId: "435706186663",
            appId: "1:435706186663:web:9eadc1d4371376768ac482"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const EMPRESA_ID = "alto_do_parque";

        const inputDataPainel = document.getElementById('data-painel');
        const containerReservas = document.getElementById('container-reservas');

        // Elementos do Modal Manual
        const modalManual = document.getElementById('modalManual');
        const btnAbrirModal = document.getElementById('btn-abrir-modal');
        const btnFecharModal = document.getElementById('btn-fechar-modal');
        const formManual = document.getElementById('form-manual');

        const hoje = new Date().toISOString().split('T')[0];
        inputDataPainel.value = hoje;

        // Controle de abertura/fechamento do Modal
        btnAbrirModal.addEventListener('click', () => {
            document.getElementById('m-data').value = inputDataPainel.value; // Pré-seleciona a data que o garçom já estava olhando
            modalManual.classList.add('active');
        });
        
        btnFecharModal.addEventListener('click', () => {
            modalManual.classList.remove('active');
            formManual.reset();
        });

        // Evento para salvar os dados manuais inseridos pelo Garçom
        formManual.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome = document.getElementById('m-nome').value;
            const whatsapp = document.getElementById('m-whatsapp').value;
            const email = document.getElementById('m-email').value || "Não informado";
            const pessoas = document.getElementById('m-pessoas').value;
            const dataSelecionada = document.getElementById('m-data').value;
            const horario = document.getElementById('m-horario').value;

            const dadosAgendamento = {
                clienteNome: nome,
                clienteWhatsapp: whatsapp,
                clienteEmail: email,
                quantidadePessoas: pessoas,
                horario: horario,
                criadoEm: new Date().toISOString()
            };

            try {
                // Insere diretamente na data escolhida, sem travas para o dia 12 ou limite de 20+ pessoas
                const novaReservaRef = push(ref(db, `agendamentos/${EMPRESA_ID}/${dataSelecionada}`));
                await set(novaReservaRef, dadosAgendamento);
                
                alert("Reserva manual registrada com sucesso!");
                modalManual.classList.remove('active');
                formManual.reset();
                
                // Atualiza o painel para a data onde a reserva foi salva para o garçom ver ela na lista
                inputDataPainel.value = dataSelecionada;
                escutarReservas(dataSelecionada);
                
            } catch (error) {
                console.error("Erro ao salvar reserva manual:", error);
                alert("Erro ao salvar. Verifique a conexão.");
            }
        });

        function escutarReservas(dataSelecionada) {
            if (!dataSelecionada) return;

            const caminhoReservas = ref(db, `agendamentos/${EMPRESA_ID}/${dataSelecionada}`);

            onValue(caminhoReservas, (snapshot) => {
                containerReservas.innerHTML = "";

                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const idReserva = childSnapshot.key;
                        const dados = childSnapshot.val();

                        let emailCliente = dados.clienteEmail || "Não informado";
                        
                        const divItem = document.createElement('div');
                        divItem.className = 'item-reserva';
                        divItem.innerHTML = `
                            <div class="info-cliente">
                                <span class="destaque-hora">${dados.horario}</span>
                                <span class="nome-cliente">${dados.clienteNome}</span> 
                                <span class="badge-pessoas">${dados.quantidadePessoas} pessoas</span>
                                <br>
                                <span class="detalhe-secundario">
                                    WhatsApp: <a class="link-whatsapp" href="https://wa.me/55${dados.clienteWhatsapp.replace(/\D/g, '')}" target="_blank">${dados.clienteWhatsapp}</a> | 
                                    E-mail: ${emailCliente}
                                </span>
                            </div>
                            <div class="acoes-reserva">
                                <button class="btn-acao btn-concluir" data-id="${idReserva}">Atendido</button>
                                <button class="btn-acao btn-cancelar" data-id="${idReserva}">Cancelar</button>
                            </div>
                        `;

                        divItem.querySelector('.btn-concluir').addEventListener('click', () => {
                            if(confirm(`Confirmar que a mesa de ${dados.clienteNome} já foi atendida?`)) {
                                remove(ref(db, `agendamentos/${EMPRESA_ID}/${dataSelecionada}/${idReserva}`));
                            }
                        });

                        divItem.querySelector('.btn-cancelar').addEventListener('click', () => {
                            if(confirm(`Deseja realmente CANCELAR e remover a reserva de ${dados.clienteNome}?`)) {
                                remove(ref(db, `agendamentos/${EMPRESA_ID}/${dataSelecionada}/${idReserva}`));
                            }
                        });

                        containerReservas.appendChild(divItem);
                    });
                } else {
                    containerReservas.innerHTML = '<p class="sem-reservas">Nenhuma reserva para este dia.</p>';
                }
            });
        }

        inputDataPainel.addEventListener('change', () => {
            escutarReservas(inputDataPainel.value);
        });

        escutarReservas(hoje);
    </script>
</body>
</html>
